<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice pipeline tester</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f4f1;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,.10);
      --txt:      #1a1a18;
      --txt2:     #6b6a65;
      --txt3:     #9c9b96;
      --accent:   #534AB7;
      --accent-l: #EEEDFE;
      --danger:   #E24B4A;
      --success:  #1D9E75;
      --radius:   12px;
      --radius-s: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #1c1c1a;
        --surface:  #242422;
        --border:   rgba(255,255,255,.09);
        --txt:      #e8e7e2;
        --txt2:     #a0a09a;
        --txt3:     #5f5e5a;
        --accent:   #AFA9EC;
        --accent-l: #26215C;
        --danger:   #F09595;
        --success:  #5DCAA5;
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: .25rem;
    }

    .subtitle { font-size: 13px; color: var(--txt3); margin-bottom: 2rem; }

    /* ── Server config ── */
    .config-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem .75rem;
      width: 100%;
      max-width: 640px;
      margin-bottom: 1.25rem;
    }
    .config-bar label { font-size: 12px; color: var(--txt3); white-space: nowrap; }
    .config-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      color: var(--txt);
      font-family: monospace;
    }

    /* ── Status pill ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--txt3);
      transition: background .3s;
    }
    .status-dot.ready    { background: var(--success); }
    .status-dot.error    { background: var(--danger); }
    .status-dot.busy     { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.35; }
    }
    .status-label { font-size: 13px; color: var(--txt2); }

    /* ── Waveform / VU meter ── */
    canvas#vu-meter {
      width: 100%;
      max-width: 640px;
      height: 48px;
      border-radius: var(--radius-s);
      background: var(--surface);
      border: 0.5px solid var(--border);
      display: block;
      margin-bottom: 1.25rem;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: .55rem 1.1rem;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-s);
      background: var(--surface);
      color: var(--txt);
      font-size: 14px;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    button:hover  { background: var(--bg); }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    button.primary:hover { opacity: .88; background: var(--accent); }

    button.danger {
      background: var(--danger);
      color: #fff;
      border-color: transparent;
    }
    button.danger:hover { opacity: .88; background: var(--danger); }

    /* ── Conversation ── */
    .conversation {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .turn {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .turn-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--txt3);
      padding: 0 .1rem;
    }
    .bubble {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      font-size: 14px;
      line-height: 1.6;
      color: var(--txt);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.assistant { border-left: 2px solid var(--accent); }
    .bubble.streaming { opacity: .75; }

    /* mini audio player */
    .audio-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--txt2);
    }
    .audio-bar button {
      padding: .25rem .5rem;
      font-size: 12px;
    }

    /* Log panel */
    details {
      width: 100%;
      max-width: 640px;
      margin-top: 2rem;
    }
    summary {
      font-size: 12px;
      color: var(--txt3);
      cursor: pointer;
      user-select: none;
      margin-bottom: .5rem;
    }
    #debug-log {
      font-family: monospace;
      font-size: 11px;
      color: var(--txt2);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-s);
      padding: .75rem;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>Voice pipeline tester</h1>
<p class="subtitle">Tests mic → VAD → llama.cpp → TTS end-to-end</p>

<div class="config-bar">
  <label>Server</label>
  <input id="server-base-url" type="text" value="http://127.0.0.1:8002" spellcheck="false" />
</div>

<div class="status-row">
  <div class="status-dot" id="status-indicator-dot"></div>
  <span class="status-label" id="status-indicator-label">Idle — click Connect to start</span>
</div>

<canvas id="vu-meter"></canvas>

<div class="controls">
  <button id="btn-connect" class="primary">
    <i class="ti ti-plug" aria-hidden="true"></i> Connect
  </button>
  <button id="btn-toggle-mic" disabled>
    <i class="ti ti-microphone" aria-hidden="true"></i> Start listening
  </button>
  <button id="btn-disconnect" disabled>
    <i class="ti ti-plug-x" aria-hidden="true"></i> Disconnect
  </button>
</div>

<div class="conversation" id="conversation-container"></div>

<details>
  <summary><i class="ti ti-terminal-2" aria-hidden="true"></i> Debug log</summary>
  <div id="debug-log"></div>
</details>

<script>
/* ─── Helpers ──────────────────────────────────────────────────────────────── */
const getEl = id => document.getElementById(id);

const appendDebugLog = (...args) => {
  const message = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
  const logEl   = getEl('debug-log');
  logEl.textContent += `[${new Date().toLocaleTimeString()}] ${message}\n`;
  logEl.scrollTop = logEl.scrollHeight;
  console.log(...args);
};

/* ─── State ────────────────────────────────────────────────────────────────── */
let serverWebSocket        = null;
let audioContext           = null;
let pcmCaptureWorklet      = null;
let microphoneStream       = null;
let isMicrophoneActive     = false;
let audioPlaybackQueue     = [];    // { blob, text }[]
let isPlayingAudio         = false;
let activeAssistantBubble  = null;  // The assistant bubble currently being streamed into.

/* ─── Status helpers ───────────────────────────────────────────────────────── */
const updateStatusIndicator = (cssClass, message) => {
  getEl('status-indicator-dot').className = `status-dot ${cssClass}`;
  getEl('status-indicator-label').textContent = message;
};

/* ─── VU meter ─────────────────────────────────────────────────────────────── */
const vuMeterCanvas  = getEl('vu-meter');
const vuMeterCtx     = vuMeterCanvas.getContext('2d');
let   frequencyAnalyser = null;
let   frequencyBinData  = null;

function renderVuMeter() {
  requestAnimationFrame(renderVuMeter);

  const canvasW = vuMeterCanvas.offsetWidth * devicePixelRatio;
  const canvasH = vuMeterCanvas.offsetHeight * devicePixelRatio;
  vuMeterCanvas.width  = canvasW;
  vuMeterCanvas.height = canvasH;

  vuMeterCtx.clearRect(0, 0, canvasW, canvasH);

  if (!frequencyAnalyser || !isMicrophoneActive) {
    vuMeterCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--txt3').trim() || '#9c9b96';
    const centerX = canvasW / 2, centerY = canvasH / 2, dotRadius = 4 * devicePixelRatio;
    vuMeterCtx.beginPath();
    vuMeterCtx.arc(centerX, centerY, dotRadius, 0, Math.PI * 2);
    vuMeterCtx.fill();
    return;
  }

  frequencyAnalyser.getByteFrequencyData(frequencyBinData);
  const barWidth  = canvasW / frequencyBinData.length * 2.5;
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#534AB7';

  for (let i = 0; i < frequencyBinData.length; i++) {
    const normalizedAmplitude = frequencyBinData[i] / 255;
    const barHeight = normalizedAmplitude * canvasH;
    vuMeterCtx.fillStyle = accentColor;
    vuMeterCtx.globalAlpha = 0.6 + normalizedAmplitude * 0.4;
    vuMeterCtx.fillRect(i * barWidth * 1.2, canvasH - barHeight, barWidth, barHeight);
  }
  vuMeterCtx.globalAlpha = 1;
}
renderVuMeter();

/* ─── AudioWorklet (inline blob) ──────────────────────────────────────────── */
const CAPTURE_WORKLET_SOURCE = `
class CaptureProcessor extends AudioWorkletProcessor {
  constructor() { super(); this._buf = []; }
  process(inputs) {
    const ch = inputs[0]?.[0];
    if (!ch) return true;
    for (let i = 0; i < ch.length; i++) this._buf.push(ch[i]);
    while (this._buf.length >= 512) {
      const f32 = this._buf.splice(0, 512);
      const i16 = new Int16Array(512);
      for (let i = 0; i < 512; i++)
        i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32767 | 0));
      this.port.postMessage(i16.buffer, [i16.buffer]);
    }
    return true;
  }
}
registerProcessor('capture-proc', CaptureProcessor);
`;

/* ─── Connect ──────────────────────────────────────────────────────────────── */
getEl('btn-connect').addEventListener('click', async () => {
  const serverBaseUrl = getEl('server-base-url').value.replace(/\/$/, '');
  updateStatusIndicator('busy', 'Starting services…');
  appendDebugLog('Calling /ready on', serverBaseUrl);
  getEl('btn-connect').disabled = true;

  try {
    const httpResponse  = await fetch(`${serverBaseUrl}/ready`);
    const readyPayload  = await httpResponse.json();
    appendDebugLog('Ready response:', readyPayload);

    if (!readyPayload.ready) throw new Error('Server returned ready=false');

    const websocketUrl = readyPayload.websocket || `ws://127.0.0.1:8002/ws`;
    appendDebugLog('Connecting WebSocket:', websocketUrl);
    serverWebSocket = new WebSocket(websocketUrl);
    serverWebSocket.binaryType = 'arraybuffer';

    serverWebSocket.onopen = () => {
      appendDebugLog('WebSocket connected');
      updateStatusIndicator('ready', 'Connected — click Start listening');
      getEl('btn-toggle-mic').disabled  = false;
      getEl('btn-disconnect').disabled  = false;
      getEl('btn-connect').disabled     = true;
    };

    serverWebSocket.onmessage = handleIncomingServerMessage;

    serverWebSocket.onerror = e => {
      appendDebugLog('WebSocket error', e);
      updateStatusIndicator('error', 'WebSocket error');
    };

    serverWebSocket.onclose = () => {
      appendDebugLog('WebSocket closed');
      updateStatusIndicator('', 'Disconnected');
      // Stop the mic if the server drops the connection while the user is speaking,
      // so the AudioWorklet doesn't keep running with nowhere to send PCM chunks.
      stopMicrophone();
      resetInterfaceToIdle();
    };

  } catch (err) {
    appendDebugLog('Error:', err.message);
    updateStatusIndicator('error', 'Connection failed — ' + err.message);
    getEl('btn-connect').disabled = false;
  }
});

/* ─── Start / stop mic ─────────────────────────────────────────────────────── */
getEl('btn-toggle-mic').addEventListener('click', async () => {
  if (!isMicrophoneActive) {
    await startMicrophone();
  } else {
    stopMicrophone();
  }
});

async function startMicrophone() {
  try {
    microphoneStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true },
    });

    audioContext = new AudioContext({ sampleRate: 16000 });
    const workletBlob = new Blob([CAPTURE_WORKLET_SOURCE], { type: 'application/javascript' });
    await audioContext.audioWorklet.addModule(URL.createObjectURL(workletBlob));

    const microphoneSource = audioContext.createMediaStreamSource(microphoneStream);

    frequencyAnalyser = audioContext.createAnalyser();
    frequencyAnalyser.fftSize = 64;
    frequencyBinData  = new Uint8Array(frequencyAnalyser.frequencyBinCount);
    microphoneSource.connect(frequencyAnalyser);

    pcmCaptureWorklet = new AudioWorkletNode(audioContext, 'capture-proc');
    pcmCaptureWorklet.port.onmessage = event => {
      if (serverWebSocket?.readyState === WebSocket.OPEN)
        serverWebSocket.send(event.data);
    };
    microphoneSource.connect(pcmCaptureWorklet);

    isMicrophoneActive = true;
    getEl('btn-toggle-mic').innerHTML = '<i class="ti ti-microphone-off" aria-hidden="true"></i> Stop listening';
    getEl('btn-toggle-mic').classList.add('danger');
    updateStatusIndicator('busy', 'Listening — speak now');
    appendDebugLog('Microphone active');

  } catch (err) {
    appendDebugLog('Mic error:', err.message);
    updateStatusIndicator('error', 'Could not access microphone: ' + err.message);
  }
}

function stopMicrophone() {
  pcmCaptureWorklet?.disconnect();
  frequencyAnalyser?.disconnect();
  microphoneStream?.getTracks().forEach(track => track.stop());
  audioContext?.close();

  frequencyAnalyser  = null;
  frequencyBinData   = null;
  pcmCaptureWorklet  = null;
  microphoneStream   = null;
  audioContext       = null;
  isMicrophoneActive = false;

  getEl('btn-toggle-mic').innerHTML = '<i class="ti ti-microphone" aria-hidden="true"></i> Start listening';
  getEl('btn-toggle-mic').classList.remove('danger');

  // Only update the status label if the socket is still open (we may be called from onclose).
  if (serverWebSocket?.readyState === WebSocket.OPEN) {
    updateStatusIndicator('ready', 'Mic stopped — WebSocket still open');
  }
  appendDebugLog('Microphone stopped');
}

/* ─── WebSocket message handler ───────────────────────────────────────────── */
function handleIncomingServerMessage(event) {
  let serverMessage;
  try {
    serverMessage = JSON.parse(event.data);
  } catch {
    appendDebugLog('Non-JSON message received:', event.data);
    return;
  }

  appendDebugLog(
    '←',
    serverMessage.type,
    serverMessage.text ? serverMessage.text.slice(0, 60) + '…' : '',
  );

  if (serverMessage.type === 'chunk') {
    appendResponseTextToConversation(serverMessage.text);
    if (serverMessage.audio) enqueueAudioChunkForPlayback(serverMessage.audio, serverMessage.text);
  }

  if (serverMessage.type === 'done') {
    finalizeAssistantResponseTurn(serverMessage.full_text);
    activeAssistantBubble = null;
  }
}

/* ─── Conversation UI ──────────────────────────────────────────────────────── */
function appendResponseTextToConversation(textChunk) {
  if (!activeAssistantBubble) {
    const turnWrapper  = document.createElement('div');
    turnWrapper.className = 'turn';

    const speakerLabel = document.createElement('div');
    speakerLabel.className = 'turn-label';
    speakerLabel.textContent = 'Assistant';

    const responseBubble = document.createElement('div');
    responseBubble.className = 'bubble assistant streaming';
    responseBubble.dataset.text = '';

    turnWrapper.append(speakerLabel, responseBubble);
    getEl('conversation-container').append(turnWrapper);
    activeAssistantBubble = responseBubble;
  }

  activeAssistantBubble.dataset.text += textChunk;
  activeAssistantBubble.textContent   = activeAssistantBubble.dataset.text;
  activeAssistantBubble.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function finalizeAssistantResponseTurn(_fullText) {
  if (!activeAssistantBubble) return;
  activeAssistantBubble.classList.remove('streaming');
  updateStatusIndicator('ready', 'Done — listening for next phrase');
}

/* ─── Audio playback queue (sequential) ───────────────────────────────────── */
function enqueueAudioChunkForPlayback(base64WavData, _associatedText) {
  const binaryString = atob(base64WavData);
  const byteArray    = new Uint8Array(binaryString.length);
  for (let i = 0; i < binaryString.length; i++) byteArray[i] = binaryString.charCodeAt(i);
  const audioBlob = new Blob([byteArray], { type: 'audio/wav' });
  audioPlaybackQueue.push({ blob: audioBlob });
  if (!isPlayingAudio) playNextQueuedAudioChunk();
}

async function playNextQueuedAudioChunk() {
  if (!audioPlaybackQueue.length) { isPlayingAudio = false; return; }

  isPlayingAudio = true;
  const { blob }  = audioPlaybackQueue.shift();
  const objectUrl = URL.createObjectURL(blob);
  const audioEl   = new Audio(objectUrl);

  audioEl.onended = () => { URL.revokeObjectURL(objectUrl); playNextQueuedAudioChunk(); };
  audioEl.onerror = e  => {
    appendDebugLog('Audio playback error:', e);
    URL.revokeObjectURL(objectUrl);
    playNextQueuedAudioChunk();
  };

  try {
    await audioEl.play();
  } catch (err) {
    appendDebugLog('Play failed:', err.message);
    playNextQueuedAudioChunk();
  }
}

/* ─── Disconnect ───────────────────────────────────────────────────────────── */
getEl('btn-disconnect').addEventListener('click', () => {
  stopMicrophone();
  serverWebSocket?.close();
  resetInterfaceToIdle();
});

function resetInterfaceToIdle() {
  getEl('btn-connect').disabled    = false;
  getEl('btn-toggle-mic').disabled = true;
  getEl('btn-disconnect').disabled = true;
  isMicrophoneActive    = false;
  activeAssistantBubble = null;
}
</script>

</body>
</html>
