<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis.ai — Chats</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    /* Ensure expanded chat threads take up all necessary space */
    .chat-card.expanded .chat-thread {
      max-height: none !important;
      height: auto !important;
      overflow: visible !important;
    }
  </style>
</head>
<body class="chats-page-body">

<header>
  <div class="logo">Jarvis<span>.</span>ai</div>

  <nav class="main-nav">
    <a href="/home" class="nav-link">Home</a>
    <a href="/chats" class="nav-link active">Chats</a>
  </nav>

  <div class="header-right">
    <span class="username-label" id="header-username"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="chats-layout">

  <div class="chats-toolbar">
    <div class="search-wrap">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="Search sessions…"
        oninput="onSearch()"
        autocomplete="off"
      >
      <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
    <div class="chats-count" id="chats-count"></div>
  </div>

  <div id="chats-list" class="chats-list">
    <div id="chats-list-content">
      <div class="chats-empty" id="chats-loading">
        <span class="empty-icon">⏳</span>
        <p>Loading sessions…</p>
      </div>
    </div>
    <div id="scroll-sentinel" style="height: 1px; margin-top: 20px;"></div>
  </div>

</div>

<script src="/public/chats.js"></script>
</body>
</html>
