<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis.ai — Sign in</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">Jarvis<span>.</span>ai</div>
    <p class="auth-tagline">Your voice, amplified by intelligence.</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign in</button>
      <button class="auth-tab" data-tab="signup">Create account</button>
    </div>

    <div id="login" class="form-section">
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">Sign in</button>
    </div>

    <div id="signup" class="form-section hidden">
      <div class="field">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="choose_a_username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" onclick="handleSignup()">Create account</button>
    </div>

    <p id="message"></p>
  </div>

  <script src="/public/index.js"></script>
</body>
</html>
