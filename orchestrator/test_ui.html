<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexa Wake Word Tester</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e8f0;
    --muted: #7a7a90;
    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.15);
    --green: #3dd68c;
    --green-glow: rgba(61,214,140,0.2);
    --red: #f25f5c;
    --amber: #f7b731;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
  }

  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.error { background: var(--red); }
  .status-dot.pulse { animation: pulse 1.4s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
  }

  .panel-section {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .field { margin-bottom: 0.8rem; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 11px;
    border-radius: 7px;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6a9ef9; }
  .btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(242,95,92,0.3);
  }
  .btn-danger:hover { background: rgba(242,95,92,0.08); }

  /* SCORE METER */
  .score-display {
    margin-bottom: 1.2rem;
  }
  .score-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .score-label .score-val {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .score-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--accent);
    transition: width 0.12s ease-out, background 0.2s;
    width: 0%;
  }
  .score-bar-fill.high { background: var(--green); }

  .threshold-line {
    position: relative;
    height: 16px;
    margin-top: -4px;
  }
  .threshold-line::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 8px;
    background: var(--amber);
    opacity: 0.7;
  }
  .threshold-line::after {
    content: 'threshold 0.5';
    position: absolute;
    left: 50%;
    top: 8px;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--amber);
    white-space: nowrap;
    opacity: 0.7;
  }

  /* DETECTION FLASH */
  .detection-badge {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
    transition: all 0.15s;
  }
  .detection-badge.active {
    background: var(--green-glow);
    border-color: var(--green);
    animation: flash 0.6s ease-out;
  }
  @keyframes flash {
    0% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .detection-icon {
    font-size: 2rem;
    margin-bottom: 0.4rem;
    display: block;
  }
  .detection-label {
    font-family: var(--display);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .detection-badge.active .detection-label { color: var(--green); }

  .detect-count {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    font-family: var(--display);
    margin-top: 0.2rem;
  }

  /* WAVEFORM */
  .waveform-wrap {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  #waveform {
    width: 100%;
    height: 60px;
    display: block;
  }

  /* RIGHT PANEL — LOG */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .log-header-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .clear-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .clear-btn:hover { color: var(--text); background: var(--surface2); }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .log-entry {
    display: grid;
    grid-template-columns: 90px 70px 1fr;
    gap: 0;
    padding: 7px 1.5rem;
    font-size: 12px;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
    animation: fadeIn 0.15s ease-out;
  }
  .log-entry:hover { background: var(--surface); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-time { color: var(--muted); font-size: 11px; }
  .log-type {
    font-size: 11px;
    font-weight: 500;
    padding: 1px 0;
    letter-spacing: 0.04em;
  }
  .log-type.detect { color: var(--green); }
  .log-type.miss { color: var(--muted); }
  .log-type.error { color: var(--red); }
  .log-type.info { color: var(--accent); }
  .log-type.server { color: var(--amber); }
  .log-msg { color: var(--text); word-break: break-all; }

  .log-entry.highlight-detect {
    background: rgba(61,214,140,0.04);
  }

  /* SERVER INFO CARD */
  .server-card {
    margin-top: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 1rem;
    font-size: 12px;
    display: none;
  }
  .server-card.visible { display: block; }
  .server-card-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--amber);
    margin-bottom: 0.6rem;
  }
  .server-info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .server-info-row span:first-child { color: var(--muted); }
  .server-info-row span:last-child { color: var(--text); font-weight: 500; }

  /* FOOTER */
  footer {
    padding: 0.8rem 2.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 2rem;
    font-size: 11px;
    color: var(--muted);
  }
  .footer-stat { display: flex; gap: 6px; }
  .footer-stat-label { color: var(--muted); }
  .footer-stat-val { color: var(--text); font-weight: 500; }

  /* SCROLLBAR */
  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">wake<span>.</span>test</div>
  <div class="status-pill">
    <div class="status-dot" id="dot"></div>
    <span id="status-text">disconnected</span>
  </div>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- AUTH -->
    <div class="panel-section">
      <div class="section-label">Connection</div>
      <div class="field">
        <label>Router Host</label>
        <input type="text" id="host" value="localhost:8000" />
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" value="admin" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" value="" />
      </div>
      <button class="btn btn-primary" id="connect-btn" onclick="connect()">Connect &amp; Start</button>
      <div style="margin-top:0.6rem;">
        <button class="btn btn-danger" id="disconnect-btn" onclick="disconnect()" style="display:none;">Disconnect</button>
      </div>
    </div>

    <!-- WAVEFORM -->
    <div class="waveform-wrap">
      <div class="section-label" style="padding:0;margin-bottom:0.8rem;">Microphone Input</div>
      <canvas id="waveform"></canvas>
    </div>

    <!-- SCORE -->
    <div class="panel-section">
      <div class="section-label">Wake Word Score</div>
      <div class="score-display">
        <div class="score-label">
          <span id="model-name">—</span>
          <span class="score-val" id="score-val">0.000</span>
        </div>
        <div class="score-bar-bg">
          <div class="score-bar-fill" id="score-bar"></div>
        </div>
        <div class="threshold-line"></div>
      </div>

      <div class="detection-badge" id="detect-badge">
        <span class="detection-icon">🎙</span>
        <div class="detection-label" id="detect-label">Listening…</div>
        <div class="detect-count" id="detect-count">0</div>
      </div>
    </div>

    <!-- SERVER RESPONSE -->
    <div class="panel-section">
      <div class="section-label">Server Response</div>
      <div style="font-size:11px;color:var(--muted);">Shown when wake word triggers a server redirect.</div>
      <div class="server-card" id="server-card">
        <div class="server-card-title">⚡ Server Ready</div>
        <div class="server-info-row"><span>IP</span><span id="srv-ip">—</span></div>
        <div class="server-info-row"><span>Port</span><span id="srv-port">—</span></div>
        <div class="server-info-row"><span>Message</span><span id="srv-msg">—</span></div>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="log-header">
      <span class="log-header-label">Event Log</span>
      <button class="clear-btn" onclick="clearLog()">Clear</button>
    </div>
    <div id="log"></div>
  </div>
</main>

<footer>
  <div class="footer-stat">
    <span class="footer-stat-label">frames sent</span>
    <span class="footer-stat-val" id="ft-frames">0</span>
  </div>
  <div class="footer-stat">
    <span class="footer-stat-label">detections</span>
    <span class="footer-stat-val" id="ft-det">0</span>
  </div>
  <div class="footer-stat">
    <span class="footer-stat-label">errors</span>
    <span class="footer-stat-val" id="ft-err">0</span>
  </div>
  <div class="footer-stat">
    <span class="footer-stat-label">sample rate</span>
    <span class="footer-stat-val">16000 Hz</span>
  </div>
  <div class="footer-stat">
    <span class="footer-stat-label">frame size</span>
    <span class="footer-stat-val">1280 samples</span>
  </div>
</footer>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let ws = null;
let audioCtx = null;
let micStream = null;
let workletNode = null;
let detectCount = 0;
let framesSent = 0;
let errCount = 0;
const SAMPLE_RATE = 16000;
const FRAME_LENGTH = 1280;

let pcmBuffer = new Float32Array(0);

const waveCanvas = document.getElementById('waveform');
const wCtx = waveCanvas.getContext('2d');
let waveData = new Float32Array(300);
let wavePos = 0;
let waveActive = false;

// ── Logging ───────────────────────────────────────────────────────────────
function log(type, msg) {
  const el = document.createElement('div');
  el.className = 'log-entry' + (type === 'detect' ? ' highlight-detect' : '');
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8) + '.' + String(now.getMilliseconds()).padStart(3, '0');
  el.innerHTML = `<span class="log-time">${ts}</span><span class="log-type ${type}">${type.toUpperCase()}</span><span class="log-msg">${escHtml(msg)}</span>`;
  const c = document.getElementById('log');
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
  console.log(`[${type}] ${msg}`);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

// ── UI ────────────────────────────────────────────────────────────────────
function setStatus(cls, text) {
  document.getElementById('dot').className = 'status-dot ' + cls;
  document.getElementById('status-text').textContent = text;
}
function setScore(name, score) {
  document.getElementById('model-name').textContent = name || '—';
  document.getElementById('score-val').textContent = score.toFixed(3);
  const bar = document.getElementById('score-bar');
  bar.style.width = Math.min(100, score * 100).toFixed(1) + '%';
  bar.className = 'score-bar-fill' + (score >= 0.5 ? ' high' : '');
}
function flashDetection(msg) {
  detectCount++;
  document.getElementById('detect-count').textContent = detectCount;
  document.getElementById('ft-det').textContent = detectCount;
  const badge = document.getElementById('detect-badge');
  badge.className = 'detection-badge active';
  document.getElementById('detect-label').textContent = msg || 'DETECTED!';
  setTimeout(() => {
    badge.className = 'detection-badge';
    document.getElementById('detect-label').textContent = 'Listening…';
  }, 1800);
}
function showServerCard(ip, port, message) {
  document.getElementById('server-card').className = 'server-card visible';
  document.getElementById('srv-ip').textContent = ip || '—';
  document.getElementById('srv-port').textContent = port || '—';
  document.getElementById('srv-msg').textContent = message || '—';
}
function updateFrameCounter() {
  document.getElementById('ft-frames').textContent = framesSent;
}

// ── Waveform ──────────────────────────────────────────────────────────────
function drawWave() {
  const w = waveCanvas.offsetWidth || 280;
  waveCanvas.width = w; waveCanvas.height = 60;
  wCtx.clearRect(0, 0, w, 60);
  const sliceW = w / waveData.length;
  wCtx.beginPath();
  wCtx.strokeStyle = waveActive ? '#4f8ef7' : '#3a3a4a';
  wCtx.lineWidth = 1.5;
  for (let i = 0; i < waveData.length; i++) {
    const x = i * sliceW;
    const y = 30 + waveData[(wavePos + i) % waveData.length] * 26;
    i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
  }
  wCtx.stroke();
  requestAnimationFrame(drawWave);
}

// ── Downsample ────────────────────────────────────────────────────────────
function downsample(buf, fromRate, toRate) {
  if (fromRate === toRate) return buf;
  const ratio = fromRate / toRate;
  const out = new Float32Array(Math.floor(buf.length / ratio));
  for (let i = 0; i < out.length; i++) {
    const s = i * ratio;
    const lo = s | 0;
    const hi = Math.min(lo + 1, buf.length - 1);
    out[i] = buf[lo] + (buf[hi] - buf[lo]) * (s - lo);
  }
  return out;
}

// ── Push samples → send frames ────────────────────────────────────────────
function pushSamples(float32At16k) {
  // waveform (raw, pre-downsample is fine)
  for (let i = 0; i < float32At16k.length; i++) {
    waveData[wavePos % waveData.length] = float32At16k[i];
    wavePos++;
  }
  waveActive = true;

  // accumulate
  const merged = new Float32Array(pcmBuffer.length + float32At16k.length);
  merged.set(pcmBuffer);
  merged.set(float32At16k, pcmBuffer.length);
  pcmBuffer = merged;

  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  while (pcmBuffer.length >= FRAME_LENGTH) {
    const frame = pcmBuffer.slice(0, FRAME_LENGTH);
    pcmBuffer = pcmBuffer.slice(FRAME_LENGTH);
    const int16 = new Int16Array(FRAME_LENGTH);
    for (let i = 0; i < FRAME_LENGTH; i++)
      int16[i] = Math.max(-32768, Math.min(32767, frame[i] * 32767 | 0));
    ws.send(int16.buffer);
    framesSent++;
    if (framesSent % 10 === 0) updateFrameCounter();
  }
  updateFrameCounter();
}

// ── AudioWorklet approach (primary) ──────────────────────────────────────
const WORKLET_CODE = `
class PcmSender extends AudioWorkletProcessor {
  constructor() { super(); this._buf = []; }
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (ch && ch.length) {
      // Copy to avoid transferring a live buffer
      const copy = new Float32Array(ch);
      this.port.postMessage(copy, [copy.buffer]);
    }
    return true;
  }
}
registerProcessor('pcm-sender', PcmSender);
`;

async function startMicWorklet(nativeRate) {
  const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
  const url  = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  const source = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx, 'pcm-sender');
  workletNode.port.onmessage = (ev) => {
    const raw = ev.data;            // Float32Array at nativeRate
    const s16 = downsample(raw, nativeRate, SAMPLE_RATE);
    pushSamples(s16);
  };
  source.connect(workletNode);
  // Keep graph alive; no audible output
  const sink = audioCtx.createGain();
  sink.gain.value = 0;
  workletNode.connect(sink);
  sink.connect(audioCtx.destination);
  log('info', `AudioWorklet running — native ${nativeRate} Hz → 16000 Hz`);
}

// ── ScriptProcessor fallback ──────────────────────────────────────────────
function startMicScriptProcessor(nativeRate) {
  const source = audioCtx.createMediaStreamSource(micStream);
  const sp = audioCtx.createScriptProcessor(4096, 1, 1);
  let callbackCount = 0;
  sp.onaudioprocessing = (e) => {
    callbackCount++;
    if (callbackCount === 1) log('info', 'ScriptProcessor: first callback fired');
    const raw = new Float32Array(e.inputBuffer.getChannelData(0)); // copy
    const s16 = downsample(raw, nativeRate, SAMPLE_RATE);
    pushSamples(s16);
  };
  source.connect(sp);
  const sink = audioCtx.createGain();
  sink.gain.value = 0;
  sp.connect(sink);
  sink.connect(audioCtx.destination);
  workletNode = sp; // store so stopMic can disconnect it
  log('info', `ScriptProcessor running — native ${nativeRate} Hz → 16000 Hz`);
}

// ── startMic ──────────────────────────────────────────────────────────────
// MUST be called synchronously inside a user-gesture handler
// so we split: createAudioContext() at button click, then resume here.
async function startMic() {
  log('info', `AudioContext state: ${audioCtx.state}`);
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume();
    log('info', `AudioContext resumed → ${audioCtx.state}`);
  }
  const nativeRate = audioCtx.sampleRate;
  document.getElementById('ft-frames').closest('footer')
    .querySelectorAll('.footer-stat')[3].querySelector('.footer-stat-val')
    .textContent = `${nativeRate} → 16000`;

  log('info', `Requesting microphone access…`);
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: {
      channelCount: 1,
      sampleRate: { ideal: 16000 },
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false
    },
    video: false
  });
  log('info', `getUserMedia OK — track: ${micStream.getAudioTracks()[0].label}`);

  try {
    await startMicWorklet(nativeRate);
  } catch (workletErr) {
    log('info', `AudioWorklet failed (${workletErr.message}), falling back to ScriptProcessor`);
    startMicScriptProcessor(nativeRate);
  }
}

function stopMic() {
  waveActive = false;
  if (workletNode) { try { workletNode.disconnect(); } catch(_){} workletNode = null; }
  if (micStream)   { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx)    { audioCtx.close().catch(()=>{}); audioCtx = null; }
  pcmBuffer = new Float32Array(0);
}

// ── WebSocket & auth ──────────────────────────────────────────────────────
async function connect() {
  const host     = document.getElementById('host').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  // Create AudioContext HERE, inside the click handler (user gesture)
  try {
    audioCtx = new AudioContext();
    log('info', `AudioContext created — state: ${audioCtx.state}, sampleRate: ${audioCtx.sampleRate}`);
  } catch(e) {
    log('error', `AudioContext creation failed: ${e.message}`);
    return;
  }

  document.getElementById('connect-btn').disabled = true;
  setStatus('pulse', 'authenticating…');
  log('info', `Authenticating with ${host}…`);

  let wsUrl;
  try {
    const resp = await fetch(`http://${host}/auth`, {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + btoa(username + ':' + password) }
    });
    if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
    const data = await resp.json();
    wsUrl = data.ws_url || `ws://${host}/ws`;
    log('info', `Auth OK — ws: ${wsUrl}`);
  } catch (err) {
    log('error', `Auth error: ${err.message}`);
    setStatus('error', 'auth failed');
    document.getElementById('connect-btn').disabled = false;
    audioCtx.close(); audioCtx = null;
    return;
  }

  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = async () => {
    setStatus('connected pulse', 'streaming');
    log('info', 'WebSocket open');
    document.getElementById('connect-btn').style.display = 'none';
    document.getElementById('disconnect-btn').style.display = 'block';
    try {
      await startMic();
      log('info', 'Ready — say "Alexa"');
    } catch(e) {
      log('error', `Mic error: ${e.message} — ${e.stack||''}`);
    }
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch(_) { log('info', 'Raw: ' + e.data); return; }

    if (data.error) {
      errCount++;
      document.getElementById('ft-err').textContent = errCount;
      log('error', data.error);
      return;
    }
    if (data.wake_word !== undefined) {
      const score = data.best_score ?? 0;
      setScore(data.best_model, score);
      if (data.wake_word) {
        flashDetection('ALEXA!');
        log('detect', `score=${score.toFixed(3)}  model=${data.best_model}`);
      } else if (score > 0.08) {
        log('miss', `score=${score.toFixed(3)}  model=${data.best_model}`);
      }
    }
    if (data.ip !== undefined) {
      showServerCard(data.ip, data.port, data.message);
      log('server', `Server ready → ${data.ip}:${data.port}  msg=${data.message}`);
    }
  };

  ws.onclose = (e) => {
    log('info', `WS closed ${e.code} ${e.reason||''}`);
    setStatus('', 'disconnected');
    cleanup();
  };
  ws.onerror = () => {
    log('error', 'WebSocket error (check browser console)');
    setStatus('error', 'ws error');
    cleanup();
  };
}

function disconnect() { if (ws) ws.close(1000, 'user disconnect'); cleanup(); }

function cleanup() {
  stopMic();
  ws = null;
  waveActive = false;
  document.getElementById('connect-btn').disabled = false;
  document.getElementById('connect-btn').style.display = 'block';
  document.getElementById('disconnect-btn').style.display = 'none';
}

// ── Init ──────────────────────────────────────────────────────────────────
drawWave();
log('info', 'Interface ready — fill credentials and click Connect.');
log('info', 'AudioWorklet primary, ScriptProcessor fallback.');
</script>
